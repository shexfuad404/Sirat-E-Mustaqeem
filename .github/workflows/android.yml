name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          sudo apt update
          # لێرەدا تەنها ئەو کتێبخانانەمان داناوە کە زۆر پێویستن و کێشە دروست ناکەن
          sudo apt install -y build-essential git python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-en-dev libavformat-dev libavcodec-dev zlib1g-dev libsqlite3-dev sqlite3 bzip2 libbz2-dev libssl-dev openssl libgdbm-dev libgdbm-compat-dev liblzma-dev libreadline-dev libncursesw5-dev libffi-dev uuid-dev libtool autoconf automake
          pip install --upgrade pip
          pip install "cython<3.0.0" buildozer

      - name: Build with Buildozer
        run: |
          export ANDROID_NDK_HOME=""
          # بەکارهێنانی debug بۆ ئەوەی بزانین کێشەکە لە کوێیە
          buildozer -v android debug
        env:
          ANDROID_NDK_HOME: ""

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Regay-Rast-Package
          path: bin/*.apk
