name: Build APK

on:
  push:
    branches: [ main ] # ناوی لقی سەرەکیت (بۆ نموونە: main یان master) دیاری بکە

jobs:
  build:
    runs-on: ubuntu-22.04 # وەشانی جێگیر بۆ کارەکانی کۆمبایل

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
        pip install --upgrade pip setuptools virtualenv cython buildozer pillow

    - name: Build with Buildozer
      run: buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: RegayRastAPK
        path: bin/*.apk
